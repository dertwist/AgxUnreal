name: Plugin Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Plugin Version
        id: get_version
        run: |
          VERSION=$(grep '"VersionName":' Plugins/AgxTonemapSwitcher/AgxTonemapSwitcher.uplugin | sed 's/.*: "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Package Plugin (Source Only)
        run: |
          PLUGIN_NAME="AgxTonemapSwitcher"
          RELEASE_DIR="release/${PLUGIN_NAME}"
          mkdir -p ${RELEASE_DIR}
          
          # Copy source and resources
          cp -r Plugins/${PLUGIN_NAME}/Source ${RELEASE_DIR}/
          cp -r Plugins/${PLUGIN_NAME}/Resources ${RELEASE_DIR}/
          cp Plugins/${PLUGIN_NAME}/${PLUGIN_NAME}.uplugin ${RELEASE_DIR}/
          
          # Clean up unnecessary files
          find ${RELEASE_DIR} -name ".DS_Store" -delete
          
          # Create zip
          cd release
          zip -r ../${PLUGIN_NAME}-${{ steps.get_version.outputs.version }}.zip ${PLUGIN_NAME}/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: AgxTonemapSwitcher-${{ steps.get_version.outputs.version }}.zip
          name: AgX Tonemap Switcher v${{ steps.get_version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ### Installation
            1. Download the `AgxTonemapSwitcher-${{ steps.get_version.outputs.version }}.zip` below.
            2. Extract it into your project's `Plugins` folder.
            3. Restart the Unreal Editor. 
            
            *Note: As this is a source-only release, the editor will prompt you to rebuild the plugin on the first launch.*
            
            ### Supported Versions
            - Unreal Engine 5.4, 5.5, 5.6, 5.7
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
